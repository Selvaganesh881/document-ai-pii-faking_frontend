<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document AI - PII Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-8">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <header class="bg-white p-6 rounded-lg shadow border border-gray-200">
            <h1 class="text-3xl font-bold text-gray-900">Document AI Pipeline</h1>
            <p class="text-sm text-gray-500 mt-1">Lightweight Static SPA</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-5 bg-white p-6 rounded-lg shadow border border-gray-200 space-y-4">
                <h2 class="text-xl font-semibold mb-4">1. Configuration</h2>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Upload PDF</label>
                    <input type="file" id="fileInput" accept="application/pdf" class="w-full border border-gray-300 p-2 rounded">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Instruction</label>
                    <textarea id="instructionInput" rows="5" class="w-full border border-gray-300 p-2 rounded text-sm font-mono">Extract the parameters defined in the schema from the document provided below.

EXTRACTION INSTRUCTIONS:
- Extract values exactly as they appear in the text.
- If a specific value cannot be found, use the key but set value to "NOT_FOUND".</textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">JSON Schema</label>
                    <textarea id="schemaInput" rows="6" class="w-full border border-gray-300 p-2 rounded text-sm font-mono">{
  "title": "DocumentExtraction",
  "type": "object",
  "properties": {
    "account_holder_name": { "type": "string" },
    "total_balance": { "type": "number" }
  }
}</textarea>
                </div>

                <button id="executeBtn" onclick="runPipeline()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition-colors">
                    Execute Pipeline
                </button>
                <div id="statusMsg" class="text-sm text-center text-gray-500 hidden">Processing... Please wait.</div>
            </div>

            <div class="lg:col-span-7 bg-white p-6 rounded-lg shadow border border-gray-200 space-y-6">
                <h2 class="text-xl font-semibold">2. Results</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <h3 class="text-sm font-bold text-gray-600 mb-2">Original Text</h3>
                        <pre id="originalOutput" class="bg-gray-100 p-3 rounded text-xs overflow-auto h-48 border border-gray-200">Awaiting execution...</pre>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold text-gray-600 mb-2">Masked Text (Sent to LLM)</h3>
                        <pre id="maskedOutput" class="bg-gray-100 p-3 rounded text-xs overflow-auto h-48 border border-gray-200">Awaiting execution...</pre>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <h3 class="text-sm font-bold text-gray-600 mb-2">LLM JSON (Faked Data)</h3>
                        <pre id="fakeJsonOutput" class="bg-gray-100 p-3 rounded text-xs overflow-auto h-64 border border-gray-200">Awaiting execution...</pre>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold text-green-600 mb-2">Final JSON (Real Data)</h3>
                        <pre id="realJsonOutput" class="bg-green-50 p-3 rounded text-xs overflow-auto h-64 border border-green-200 text-green-900">Awaiting execution...</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runPipeline() {
            const fileInput = document.getElementById('fileInput').files[0];
            const instruction = document.getElementById('instructionInput').value;
            const schema = document.getElementById('schemaInput').value;
            
            const btn = document.getElementById('executeBtn');
            const status = document.getElementById('statusMsg');

            if (!fileInput) {
                alert("Please select a PDF file first.");
                return;
            }

            // Update UI to loading state
            btn.disabled = true;
            btn.classList.add("opacity-50");
            status.classList.remove("hidden");

            // Build payload
            const formData = new FormData();
            formData.append("file", fileInput);
            formData.append("user_instruction", instruction);
            formData.append("json_schema", schema);

            try {
                // Ensure your Python FastAPI is running on port 8000
                const response = await fetch("http://localhost:8000/api/process", {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if (result.status === "success") {
                    // Populate UI with results
                    document.getElementById('originalOutput').textContent = result.original_text;
                    document.getElementById('maskedOutput').textContent = result.masked_text;
                    document.getElementById('fakeJsonOutput').textContent = JSON.stringify(result.extracted_json, null, 2);
                    document.getElementById('realJsonOutput').textContent = JSON.stringify(result.unmasked_json, null, 2);
                } else {
                    alert("Pipeline Error: " + result.message);
                }
            } catch (error) {
                console.error(error);
                alert("Failed to connect to backend. Make sure Uvicorn is running on port 8000.");
            } finally {
                // Reset UI
                btn.disabled = false;
                btn.classList.remove("opacity-50");
                status.classList.add("hidden");
            }
        }
    </script>
</body>
</html>
